<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theater6</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
    <script src="index.js" defer></script>
  </head>
  <body>
    <!--
      App header:
      - communicates the product identity
      - collects the user's search query
      - exposes the client-side sort control
    -->
    <header class="hero">
      <h1>Theater6</h1>
      <h2>Search for your next viewing experience</h2>
      <div class="hero__controls">
        <div class="search-bar">
          <input
            id="search-input"
            name="search"
            placeholder="Type to Search"
            type="text"
            oninput="onSearchChange(event)"
          />
          <button
            class="search-bar__clear"
            type="button"
            onclick="clearSearchInput()"
            aria-label="Clear search"
          >
            &times;
          </button>
        </div>
        <select
          class="sort-select"
          name="sort"
          id="sort-select"
          onchange="sortMovies(event.target.value)"
        >
          <option value="" disabled selected>Sort</option>
          <option value="NEW_TO_OLD">Newest First</option>
          <option value="OLD_TO_NEW">Oldest First</option>
          <option value="RATING_HIGH_TO_LOW">Rating, High to Low</option>
          <option value="RATING_LOW_TO_HIGH">Rating, Low to High</option>
        </select>
      </div>
    </header>
    <main>
      <!--
        This results region starts empty.
        JavaScript treats it as the render target for all result states:
        loading, empty, error, and populated movie cards.
      -->
      <section id="movie-results" class="movie-results">
        <div class="movie-grid">
          <i class="fas fa-spinner movies__loading--spinner"></i>
        </div>
      </section>
    </main>
    <footer>
      <div class="footer__inner">
        <div class="footer__stack">
          <div>
            <figure class="footer__logo">
              <img class="footer__img" src="./assets/movie.png" alt="" />
            </figure>
          </div>
          <div class="footer__copyright">
            Copyright © 2026 Theater6 Steven Frasica
          </div>
          <a
            class="footer__attribution"
            href="https://www.flaticon.com/free-icons/movie"
            title="movie icons"
            target="_blank"
            >Movie icon created by Freepik - Flaticon</a
          >
        </div>
      </div>
    </footer>

    <!--
      Modal dialog for the selected movie.
      JavaScript fills these placeholders from the cached movieDetails array
      so the app does not need another API request when a card is clicked.
    -->
    <div
      id="modal"
      class="modal"
      aria-hidden="true"
    >
      <div
        class="modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <button
          class="modal__close"
          type="button"
          onclick="closeMovieDetailsModal()"
          aria-label="Close modal"
        >
          &times;
        </button>
        <div class="modal__content">
          <img
            id="modal-poster"
            class="modal__poster"
            src=""
            alt="Movie poster"
          />
          <div class="modal__body">
            <h3 id="modal-title"></h3>
            <!-- Individual content regions make it easier to update modal fields independently. -->
            <div
              id="modal-meta"
              class="modal__meta"
            ></div>
            <div
              id="modal-runtime"
              class="modal__runtime"
            ></div>
            <div
              id="modal-cast"
              class="modal__cast"
            ></div>
            <div
              id="modal-text"
              class="modal__text"
            ></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
