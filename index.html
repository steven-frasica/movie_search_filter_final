<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="config.js"></script>
    <script src="index.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
    <title>Document</title>
  </head>
  <body>
    <header class="hero">
      <h1>Theater6</h1>
      <h2>Search for your next viewing experience</h2>
      <div class="hero__controls">
        <div class="search-bar">
          <input
            id="search-input"
            name="search"
            type="text"
            placeholder="Type to Search"
            oninput="onSearchChange(event)"
          />
          <button
            class="search-bar__clear"
            type="button"
            aria-label="Clear search"
          >
            &times;
          </button>
        </div>
        <select name="sort" class="sort-select" id="sort-select">
          <option value="" disabled selected>Sort</option>
          <option value="NEW_TO_OLD">Newest First</option>
          <option value="OLD_TO_NEW">Oldest First</option>
          <option value="RATING_HIGH_TO_LOW">Rating, High to Low</option>
          <option value="RATING_LOW_TO_HIGH">Rating, Low to High</option>
        </select>
      </div>
    </header>
    <main>
      <section id="movie-results" class="movie-results">
        <div class="movie-results--grid">
          <i class="fas fa-spinner movies__loading--spinner"></i>
        </div>
      </section>
      <footer></footer>
      <div class="modal" aria-hidden="true">
        <div class="modal__details--container"></div>
        <button class="modal__close--button"></button>
        <div class="modal__poster"></div>
        <div class="modal__title"></div>
        <div class="modal__meta"></div>
        <div class="modal__runtime"></div>
        <div class="modal__cast"></div>
        <div class="modal__plot"></div>
      </div>
    </main>
  </body>
</html>
